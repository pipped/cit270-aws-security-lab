AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CIT 270 AWS Security Lab — provisions VPC, subnets, security groups,
  IAM role, and two EC2 instances (web tier + app tier).
  Deploy with: aws cloudformation deploy --template-file lab-stack.yaml --stack-name cit270-lab --capabilities CAPABILITY_IAM

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH access

  YourIP:
    Type: String
    Description: "Your public IP for SSH access (e.g. 1.2.3.4/32)"
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/32$"

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2
    Description: Amazon Linux 2 AMI (auto-resolved via SSM)

  InstanceType:
    Type: String
    Default: t2.micro
    AllowedValues: [t2.micro, t3.micro]
    Description: Free-tier eligible instance type

Resources:

  # ─── VPC ────────────────────────────────────────────────────────────────────

  LabVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: cit270-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LabVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: cit270-public-subnet

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: cit270-private-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LabVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ─── Security Groups ────────────────────────────────────────────────────────

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: sg-web
      GroupDescription: Web tier — HTTP/HTTPS open to internet, SSH from your IP
      VpcId: !Ref LabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from internet
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref YourIP
          Description: SSH from student IP only
      Tags:
        - Key: Name
          Value: sg-web

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: sg-app
      GroupDescription: App tier — port 3000 from web SG only; no internet inbound
      VpcId: !Ref LabVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref WebSecurityGroup
          Description: API from web tier only
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref YourIP
          Description: SSH from student IP only
      Tags:
        - Key: Name
          Value: sg-app

  # ─── IAM ────────────────────────────────────────────────────────────────────

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: cit270-lab-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/cit270-lab/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: cit270-lab-ec2-profile
      Roles:
        - !Ref EC2InstanceRole

  # ─── EC2 Instances ──────────────────────────────────────────────────────────

  WebEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: cit270-web-ec2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          APP_TIER_IP=${AppEC2.PrivateIp}
          yum update -y
          amazon-linux-extras enable nginx1
          yum install -y nginx git
          git clone https://github.com/YOUR_USERNAME/cit270-aws-security-lab.git /opt/lab
          cp -r /opt/lab/app/frontend/* /usr/share/nginx/html/
          sed -i "s|http://localhost:3000||g" /usr/share/nginx/html/app.js
          cat > /etc/nginx/conf.d/lab.conf <<EOF
          server {
              listen 80;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;
              location / { try_files \$uri \$uri/ /index.html; }
              location /api/ { proxy_pass http://${AppEC2.PrivateIp}:3000; }
              location /health { proxy_pass http://${AppEC2.PrivateIp}:3000/health; }
          }
          EOF
          systemctl enable nginx && systemctl start nginx

  AppEC2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmiId
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      Tags:
        - Key: Name
          Value: cit270-app-ec2
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          curl -fsSL https://rpm.nodesource.com/setup_18.x | bash -
          yum install -y nodejs git
          git clone https://github.com/YOUR_USERNAME/cit270-aws-security-lab.git /opt/lab
          cd /opt/lab/app/backend
          npm install --production
          cat > /etc/systemd/system/lab-api.service <<EOF
          [Unit]
          Description=CIT 270 Lab API
          After=network.target
          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/lab/app/backend
          ExecStart=/usr/bin/node server.js
          Restart=on-failure
          Environment=PORT=3000
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable lab-api
          systemctl start lab-api

Outputs:
  WebPublicIP:
    Description: Web tier public IP — open this in a browser
    Value: !GetAtt WebEC2.PublicIp

  AppPrivateIP:
    Description: App tier private IP — only reachable from the web tier
    Value: !GetAtt AppEC2.PrivateIp

  WebSecurityGroupId:
    Description: sg-web ID
    Value: !Ref WebSecurityGroup

  AppSecurityGroupId:
    Description: sg-app ID
    Value: !Ref AppSecurityGroup
